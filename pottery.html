<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .image-container {
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .image-container img {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        opacity: 0;
        transition: opacity 0.5s ease-in-out;
        }

        .image-container img:first-child {
        opacity: 1;
        }
    </style>
</head>
<body>
    <div class="image-container">
        <img src="image1.jpg" alt="Pottery Image 1">
        <img src="image2.jpg" alt="Pottery Image 2">
        <img src="image3.jpg" alt="Pottery Image 3">
      </div>
</body>
<script>
    const images = document.querySelectorAll('.image-container img');
let currentImageIndex = 0;

function showNextImage() {
  // Hide the current image
  images[currentImageIndex].style.opacity = 0;
  
  // Move to the next image
  currentImageIndex++;
  if (currentImageIndex >= images.length) {
    currentImageIndex = 0;
  }
  
  // Show the next image
  images[currentImageIndex].style.opacity = 1;
}

// Listen for scroll events
let lastScrollTime = 0;
window.addEventListener('scroll', () => {
  const now = Date.now();
  if (now - lastScrollTime < 1000) {
    // Ignore scroll events that occur less than 1 second apart
    return;
  }
  
  // Show the next image
  showNextImage();
  
  // Scroll to the top of the next image
  const nextImageTop = images[currentImageIndex].offsetTop;
  window.scrollTo({
    top: nextImageTop
  });
  
  // Update the last scroll time
  lastScrollTime = now;
}, { passive: true });
</script>
</html>
